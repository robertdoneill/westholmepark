AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//Z';


const HZ_SIZE = {
  1: { w: 8.5, h: 7.0 },
  2: { w: 5.5, h: 5.5 },
  3: { w: 9.0, h: 6.5 },
}[FLOOR_NUM];

let state = { selectedKey: null, filter: 'all' };

const planImg = document.getElementById('plan-img');
const hotzoneLayer = document.getElementById('hotzone-layer');
const panel = document.getElementById('panel');
const tooltip = document.getElementById('tooltip');

function renderFloor() {
  planImg.src = FLOOR_IMAGE;
  hotzoneLayer.innerHTML = '';

  ROOMS.forEach(room => {
    const hz = document.createElement('div');
    hz.className = 'hotzone' + (room.type === 'shared' ? ' shared' : '');
    hz.style.left = room.pct_x + '%';
    hz.style.top = room.pct_y + '%';
    hz.style.width = HZ_SIZE.w + '%';
    hz.style.height = HZ_SIZE.h + '%';

    if (state.filter !== 'all') {
      const matches =
        (state.filter === 'private' && room.type === 'private') ||
        (state.filter === 'shared' && room.type === 'shared') ||
        (state.filter === 'large' && room.sqft && room.sqft >= 140);
      if (!matches) hz.classList.add('dimmed');
    }
    if (state.selectedKey === 'room:' + room.id) hz.classList.add('selected');

    const lbl = document.createElement('span');
    lbl.className = 'hz-num';
    lbl.style.fontSize = FLOOR_NUM === 2 ? '9px' : '11px';
    lbl.textContent = room.id.replace('#', '');
    hz.appendChild(lbl);

    hz.addEventListener('click', () => selectRoom(room));
    hz.addEventListener('mouseenter', e => showTooltip(e, room));
    hz.addEventListener('mousemove', moveTooltip);
    hz.addEventListener('mouseleave', hideTooltip);
    hotzoneLayer.appendChild(hz);
  });

  COMMON.forEach((c, idx) => {
    const dot = document.createElement('div');
    dot.className = 'common-dot';
    dot.style.left = c.pct_x + '%';
    dot.style.top = c.pct_y + '%';
    const key = 'common:' + c.name + '-' + idx;
    if (state.selectedKey === key) dot.classList.add('selected');
    dot.addEventListener('click', () => selectCommon(c, idx));
    dot.addEventListener('mouseenter', e => {
      tooltip.textContent = c.name;
      tooltip.classList.add('show');
      moveTooltip(e);
    });
    dot.addEventListener('mousemove', moveTooltip);
    dot.addEventListener('mouseleave', hideTooltip);
    hotzoneLayer.appendChild(dot);
  });
}

function showTooltip(e, room) {
  let txt = 'Room ' + room.id.replace('#', '');
  if (room.sqft) txt += ' · ' + room.sqft + ' ft²';
  txt += ' · ' + (room.type === 'private' ? 'Private' : 'Shared (' + room.occupancy + ')');
  tooltip.textContent = txt;
  tooltip.classList.add('show');
  moveTooltip(e);
}
function moveTooltip(e) { tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY + 14) + 'px'; }
function hideTooltip() { tooltip.classList.remove('show'); }

function selectRoom(room) {
  state.selectedKey = 'room:' + room.id;
  renderFloor();
  renderRoomPanel(room);
}
function selectCommon(common, idx) {
  state.selectedKey = 'common:' + common.name + '-' + idx;
  renderFloor();
  renderCommonPanel(common);
}

const COMMON_VIBES = {
  'Courtyard': 'A walled garden retreat. String lights overhead, picnic table, that golden-hour LA light filtering through palm fronds. Where Sunday afternoons happen.',
  'Living Room': 'Sunken seating, big windows, the unofficial center of house gravity. Movie nights, group study sessions, the couch where you accidentally meet your best friend.',
  'Dining Room': 'A long communal table for house dinners. Friday potlucks happen here whether you signed up or not.',
  'Kitchen': 'Two-cook capacity with island prep space. Gas range, double sink, and the coffee machine that runs the household.',
  'Library': 'Dark wood, warm lamps, deep silence. The dedicated quiet zone — claim a chair and disappear into your reading.',
  'Foyer': 'Grand entry with the original staircase. Drop your shoes, drop your tension.',
  'Pantry': 'Shared dry-goods storage. Label your stuff, take your turn cleaning, the usual.',
  'Bath': 'Shared bathroom with full-size shower. Cleaned weekly by service.',
  'Hall': 'Connecting corridor with original molding. Quiet, well-lit at all hours.',
  'Stor.': 'Storage closet for residents.',
  'Fire Escape': 'External egress per LA code.',
};

function renderRoomPanel(r) {
  const isShared = r.type === 'shared';
  const occLabel = isShared ? 'Shared (' + r.occupancy + ' residents)' : 'Private room';

  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-eyebrow">Bedroom · Floor ${FLOOR_NUM} · ${occLabel}</div>
      <div class="panel-title">Room <em>${r.id.replace('#','')}</em></div>
      <div class="panel-sub">${r.vibe || ''}</div>
    </div>
    <div class="iso-room-mini">${renderRoomIso(r)}</div>
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">Square Feet</div>
        <div class="stat-value">${r.sqft || '—'}<span class="unit">ft²</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Occupancy</div>
        <div class="stat-value">${r.occupancy}<span class="unit">${r.occupancy === 1 ? 'person' : 'people'}</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Bed</div>
        <div class="stat-value" style="font-size:16px;">${r.beds}${r.occupancy === 2 ? ' × 2' : ''}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Desks</div>
        <div class="stat-value">${r.desks}</div>
      </div>
    </div>
    <ul class="feature-list">
      <li><span class="key">Bathroom</span><span class="value">${isShared ? 'Shared (hall bath)' : 'Hall or adjacent'}</span></li>
      <li><span class="key">Floor</span><span class="value">${FLOOR_NUM === 1 ? 'Ground' : FLOOR_NUM === 2 ? 'Second' : 'Third'}</span></li>
      <li><span class="key">Type</span><span class="value">${isShared ? 'Shared' : 'Private'}</span></li>
    </ul>
    <div class="roommate-card">
      <div class="key">What's included</div>
      <p>Furnished bed${r.occupancy > 1 ? 's' : ''}, ${r.desks} desk${r.desks > 1 ? 's' : ''} with chair, wardrobe, all utilities, weekly common-area cleaning, fast Wi-Fi, all common spaces.</p>
    </div>
  `;
}

function renderCommonPanel(c) {
  const vibe = COMMON_VIBES[c.name] || 'A shared common space available to all residents.';
  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-eyebrow">Common space · Floor ${FLOOR_NUM}</div>
      <div class="panel-title"><em>${c.name}</em></div>
    </div>
    <p style="font-size:15px; line-height:1.7; font-style:italic; color:var(--ink-soft);">${vibe}</p>
    <div class="ornament-rule">shared by all residents</div>
    <p style="font-size:13px; color:var(--ink-soft); line-height:1.6;">Available 24/7 to all Westholme Park residents. Cleaned weekly by professional service.</p>
  `;
}

function renderEmptyPanel() {
  const totalRooms = ROOMS.length;
  const privateCount = ROOMS.filter(r => r.type === 'private').length;
  const sharedCount = totalRooms - privateCount;
  panel.innerHTML = `
    <div class="empty-state">
      <div class="ornament">❦</div>
      <h2><em style="font-style:italic; color:var(--accent);">${FLOOR_NUM === 1 ? 'Ground' : FLOOR_NUM === 2 ? 'Second' : 'Third'} Floor</em></h2>
      <p style="text-align:center; font-style:italic;">${totalRooms} bedroom${totalRooms > 1 ? 's' : ''} · ${COMMON.length} common space${COMMON.length !== 1 ? 's' : ''}</p>
      <div class="ornament-rule">at a glance</div>
      <div class="summary-grid">
        <div class="summary-cell"><div class="num">${totalRooms}</div><div class="lbl">Bedrooms</div></div>
        <div class="summary-cell"><div class="num">${privateCount}</div><div class="lbl">Private</div></div>
        <div class="summary-cell"><div class="num">${sharedCount}</div><div class="lbl">Double</div></div>
        <div class="summary-cell"><div class="num">${COMMON.length}</div><div class="lbl">Common</div></div>
      </div>
      <p>Click any numbered room to see its size, bed setup, and bathroom situation. The orange dots mark common spaces.</p>
      <div class="ornament-rule">legend</div>
      <div class="legend">
        <div class="legend-row"><div class="legend-swatch" style="background:var(--avail); border-color:var(--avail-line);"></div><span>Private room</span></div>
        <div class="legend-row"><div class="legend-swatch" style="background:var(--shared); border-color:var(--shared-line);"></div><span>Double room</span></div>
        <div class="legend-row"><div class="legend-swatch" style="background:var(--accent-2); border-color:var(--bg); border-radius:50%; width:12px; height:12px;"></div><span>Common space</span></div>
      </div>
    </div>
  `;
}

function renderRoomIso(r) {
  const beds = r.occupancy;
  const desks = r.desks;
  let bedShapes = '';
  if (beds === 1) {
    bedShapes = `
      <g transform="translate(70, 80)">
        <polygon points="0,0 50,-25 90,-5 40,20" fill="#c89b3a" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="0,0 0,8 40,28 40,20" fill="#9a7530" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="40,20 90,-5 90,3 40,28" fill="#7a5d24" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="5,-12 30,-25 50,-15 25,-3" fill="#f4f1ea" stroke="#1a1a1a" stroke-width="0.7"/>
      </g>`;
  } else {
    bedShapes = `
      <g transform="translate(40, 60)">
        <polygon points="0,0 45,-22 80,-4 35,18" fill="#c89b3a" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="0,0 0,7 35,25 35,18" fill="#9a7530" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="35,18 80,-4 80,3 35,25" fill="#7a5d24" stroke="#1a1a1a" stroke-width="1"/>
      </g>
      <g transform="translate(155, 105)">
        <polygon points="0,0 45,-22 80,-4 35,18" fill="#c89b3a" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="0,0 0,7 35,25 35,18" fill="#9a7530" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="35,18 80,-4 80,3 35,25" fill="#7a5d24" stroke="#1a1a1a" stroke-width="1"/>
      </g>`;
  }
  let deskShapes = '';
  if (desks === 1) {
    deskShapes = `
      <g transform="translate(190, 60)">
        <polygon points="0,0 40,-20 70,-5 30,15" fill="#2d5a4f" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="0,0 0,6 30,21 30,15" fill="#1f3f37" stroke="#1a1a1a" stroke-width="0.8"/>
        <line x1="2" y1="6" x2="2" y2="38" stroke="#1a1a1a" stroke-width="1"/>
        <line x1="28" y1="20" x2="28" y2="52" stroke="#1a1a1a" stroke-width="1"/>
      </g>`;
  } else {
    deskShapes = `
      <g transform="translate(205, 40)">
        <polygon points="0,0 35,-17 60,-4 25,13" fill="#2d5a4f" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="0,0 0,5 25,18 25,13" fill="#1f3f37" stroke="#1a1a1a" stroke-width="0.8"/>
      </g>
      <g transform="translate(50, 145)">
        <polygon points="0,0 35,-17 60,-4 25,13" fill="#2d5a4f" stroke="#1a1a1a" stroke-width="1"/>
        <polygon points="0,0 0,5 25,18 25,13" fill="#1f3f37" stroke="#1a1a1a" stroke-width="0.8"/>
      </g>`;
  }
  return `
    <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
      <polygon points="20,140 160,60 300,140 160,220" fill="#ebe6db" stroke="#1a1a1a" stroke-width="1.5"/>
      <polygon points="20,140 160,60 160,20 20,100" fill="#f4f1ea" stroke="#1a1a1a" stroke-width="1.5"/>
      <polygon points="160,60 300,140 300,100 160,20" fill="#dfd8c8" stroke="#1a1a1a" stroke-width="1.5"/>
      <polygon points="50,90 90,70 90,40 50,60" fill="#cfe5e8" stroke="#1a1a1a" stroke-width="1"/>
      <polygon points="200,90 240,110 240,80 200,60" fill="#cfe5e8" stroke="#1a1a1a" stroke-width="1"/>
      ${bedShapes}
      ${deskShapes}
      <text x="160" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#4a4a4a" letter-spacing="2">
        ROOM ${r.id.replace('#','')} · ${beds} BED${beds > 1 ? 'S' : ''} · ${desks} DESK${desks > 1 ? 'S' : ''}
      </text>
    </svg>
  `;
}

document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.filter = btn.dataset.filter;
    renderFloor();
  });
});

renderFloor();
renderEmptyPanel();
</script>
</body>
</html>
